app = 'dblect'
primary_region = 'fra'

[build]

# HTTP service for static files
[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# SSH service on port 23234
[[services]]
  internal_port = 23234
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true

  [[services.ports]]
    port = 23234

[[files]]
  guest_path = "/usr/local/bin/ssh-keys/id_ed25519.pub"
  secret_name = "DBLECT_SSH_SERVER_PUBLIC_KEY"
  perm = "0600"

[[files]]
  guest_path = "/usr/local/bin/ssh-keys/id_ed25519"
  secret_name = "DBLECT_SSH_SERVER_PRIVATE_KEY"
  perm = "0600"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
